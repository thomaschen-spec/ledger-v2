name: Keep Render app awake

# ledger-v2 runs on Render's free tier, which spins the service down after
# ~15 minutes of no traffic. The next real visit then has to wait through a
# slow cold start. This workflow pings the homepage regularly to keep it warm.
#
# Schedule: every 10 minutes, all day (Taiwan time covers UTC+8, so this
# just runs around the clock rather than restricting to daytime hours).
# GitHub Actions cron times are best-effort and can slip a few minutes under load.
#
# To stop this: delete this file, or go to the repo's Actions tab and disable
# the "Keep Render app awake" workflow.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping homepage to prevent Render free-tier sleep
        run: curl -s -o /dev/null -m 60 https://ledger-v2-w07a.onrender.com/
